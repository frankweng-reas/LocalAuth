# 專案根目錄的 .env 會自動用於 ${VAR} 替換（勿把敏感資訊 commit）。
# 變更 .env 後請 docker compose up -d（無需 rebuild）；變更程式碼需 --build。
# 根目錄 .env 可設定 POSTGRES_USER / POSTGRES_PASSWORD / POSTGRES_DB（勿 commit 真密碼）。
# 密碼若含 @ : / 等字元，請先 URL 編碼再放入 DATABASE_URL；建議用英數或 openssl rand -hex 24。
services:
  app:
    build: .
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-localauth}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-1h}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      BASE_URL: ${BASE_URL:-http://localhost:4000}
      PORT: 4000
      # On-prem / 帳號政策（與專案 .env.example 對齊；可於專案根目錄 .env 設定後由 compose 代入）
      REQUIRE_EMAIL_VERIFICATION: ${REQUIRE_EMAIL_VERIFICATION:-true}
      REGISTRATION_DISABLED: ${REGISTRATION_DISABLED:-false}
      FORGOT_PASSWORD_ENABLED: ${FORGOT_PASSWORD_ENABLED:-true}
      # 未設定時 /admin/* 會回應「Admin API is not configured」；正式環境請務必設定
      ADMIN_API_KEY: ${ADMIN_API_KEY:-}
      AD_ENABLED: ${AD_ENABLED:-false}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-console}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      EMAIL_VERIFY_SUBJECT: ${EMAIL_VERIFY_SUBJECT:-}
      EMAIL_VERIFY_APP_NAME: ${EMAIL_VERIFY_APP_NAME:-}
      EMAIL_VERIFY_GREETING: ${EMAIL_VERIFY_GREETING:-}
      EMAIL_VERIFY_BODY: ${EMAIL_VERIFY_BODY:-}
      EMAIL_VERIFY_BUTTON: ${EMAIL_VERIFY_BUTTON:-}
      EMAIL_VERIFY_FOOTER: ${EMAIL_VERIFY_FOOTER:-}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-localauth}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
